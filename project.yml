name: SigmaQuantCopilot
options:
  bundleIdPrefix: com.sigmaquantsystems
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"               # langage Swift 5 : évite la concurrence stricte avec Process/URLSession
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.sigmaquantsystems.copilot
    CODE_SIGN_IDENTITY: "-"            # ad-hoc (pas de hardened runtime -> DYLD_LIBRARY_PATH honoré)
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  SigmaQuantCopilot:
    type: application
    platform: macOS
    sources:
      - path: SigmaQuant
    settings:
      base:
        INFOPLIST_FILE: SigmaQuant/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sigmaquantsystems.copilot
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        PRODUCT_NAME: "SigmaQuant Copilot"
